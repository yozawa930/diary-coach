<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Diary Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --surface2: #f3f1ee;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1916;
      --text2: #6b6860;
      --text3: #a09d98;
      --accent: #2c5f3f;
      --accent-light: #eef5f1;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1d1b;
        --surface2: #252420;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
        --text: #f0ede8;
        --text2: #9e9b96;
        --text3: #5e5c58;
        --accent: #5fa87a;
        --accent-light: #1a2e22;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      background: var(--accent-light);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 22px;
    }

    .header h1 {
      font-family: 'Lora', serif;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.6;
    }

    /* API Key section */
    .api-section {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .api-section summary {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .api-section summary::before {
      content: '▶';
      font-size: 9px;
      transition: transform 0.2s;
    }

    .api-section[open] summary::before {
      transform: rotate(90deg);
    }

    .api-section .inner {
      margin-top: 1rem;
    }

    .field-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      margin-bottom: 6px;
      display: block;
    }

    .api-input {
      width: 100%;
      padding: 10px 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-input:focus { border-color: var(--border2); }

    .api-hint {
      font-size: 12px;
      color: var(--text3);
      margin-top: 6px;
    }

    .api-hint a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Date */
    .date-badge {
      display: inline-block;
      font-size: 12px;
      color: var(--text3);
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 1.5rem;
    }

    /* Input card */
    .input-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .input-card-header {
      padding: 1rem 1.25rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .diary-textarea {
      width: 100%;
      min-height: 220px;
      border: none;
      padding: 1rem 1.25rem 1.25rem;
      font-family: 'Lora', serif;
      font-size: 15px;
      line-height: 1.85;
      color: var(--text);
      background: transparent;
      resize: vertical;
      outline: none;
    }

    .diary-textarea::placeholder {
      color: var(--text3);
      font-style: italic;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .btn-run {
      flex: 1;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-run:hover { opacity: 0.88; }
    .btn-run:active { transform: scale(0.98); }
    .btn-run:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-clear {
      padding: 12px 18px;
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-clear:hover { background: var(--surface2); }

    /* Divider */
    .divider {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 2rem 0;
    }

    /* Results */
    .results {
      display: none;
      animation: fadeUp 0.5s ease both;
    }

    .results.visible { display: block; }

    /* Tab row */
    .tab-row {
      display: flex;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3px;
      margin-bottom: 1.25rem;
      gap: 3px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 0 0 0.5px var(--border);
    }

    /* Result cards */
    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .rewrite-body {
      padding: 1.5rem;
      font-family: 'Lora', serif;
      font-size: 15px;
      line-height: 1.9;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* Vocab table */
    .vocab-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .vocab-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      border-bottom: 0.5px solid var(--border);
    }

    .vocab-table td {
      padding: 11px 14px;
      border-bottom: 0.5px solid var(--border);
      vertical-align: top;
      line-height: 1.55;
    }

    .vocab-table tr:last-child td { border-bottom: none; }
    .vocab-table tbody tr:hover td { background: var(--surface2); }

    .phrase-col {
      font-family: 'Lora', serif;
      font-style: italic;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    .meaning-col { color: var(--text); }
    .tip-col { color: var(--text2); font-size: 12px; }

    /* Results header */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .download-btn:hover { background: var(--surface2); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text2);
      font-size: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    /* Error */
    .error-msg {
      background: #fff0f0;
      border: 0.5px solid #f5c0c0;
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      font-size: 14px;
      color: #c0392b;
      margin-bottom: 1rem;
    }

    @media (prefers-color-scheme: dark) {
      .error-msg { background: #2e1a1a; border-color: #5a2a2a; color: #f08080; }
    }

    .hidden { display: none !important; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Grammar check */
    .grammar-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .grammar-item {
      background: var(--surface);
      border-radius: 0;
      padding: 1rem 1.25rem;
      border-bottom: 0.5px solid var(--border);
    }

    .grammar-item:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .grammar-item:last-child { border-radius: 0 0 var(--radius-lg) var(--radius-lg); border-bottom: none; }
    .grammar-item:only-child { border-radius: var(--radius-lg); border-bottom: none; }

    .grammar-original {
      font-family: 'Lora', serif;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 6px;
      line-height: 1.6;
    }

    .grammar-original span {
      background: #fff0ec;
      color: #c0392b;
      border-radius: 3px;
      padding: 0 3px;
    }

    @media (prefers-color-scheme: dark) {
      .grammar-original span { background: #3a1a14; color: #f08070; }
    }

    .grammar-arrow {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .grammar-corrected {
      font-family: 'Lora', serif;
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .grammar-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text3);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .grammar-explanation {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
    }

    .grammar-none {
      text-align: center;
      padding: 2.5rem;
      color: var(--text2);
      font-size: 14px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
    }

    /* Mobile */
    @media (max-width: 480px) {
      body { padding: 1.5rem 1rem 3rem; }
      .header h1 { font-size: 20px; }
      .vocab-table th:nth-child(3),
      .vocab-table td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="logo-mark">✍️</div>
      <h1>English Diary Coach</h1>
      <p>日記を入力すると、C2レベルへの書き換えと<br>語彙リストを自動生成します</p>
    </div>

    <!-- API Key -->
    <details class="api-section" id="api-details">
      <summary>APIキーの設定</summary>
      <div class="inner">
        <label class="field-label" for="api-key-input">Anthropic API Key</label>
        <input type="password" id="api-key-input" class="api-input" placeholder="sk-ant-..." autocomplete="off">
        <p class="api-hint">
          キーは <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で取得できます。
          ブラウザのみに保存され、外部には送信されません。
        </p>
        <button class="btn-clear" style="margin-top: 10px; font-size: 13px;" onclick="saveKey()">保存する</button>
      </div>
    </details>

    <!-- Date -->
    <div>
      <span class="date-badge" id="today-date"></span>
    </div>

    <!-- Diary input -->
    <div class="input-card">
      <div class="input-card-header">
        <span class="field-label" style="margin-bottom:0;">今日の日記</span>
      </div>
      <textarea
        id="diary-input"
        class="diary-textarea"
        placeholder="Happy moments&#10;My daughter has become able to prepare her clothes...&#10;&#10;Reflections&#10;I didn't get enough sleep because...&#10;&#10;Gratitude&#10;I can work as a pediatrician..."
      ></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-run" id="run-btn" onclick="runCoach()">C2レベルに書き換える</button>
      <button class="btn-clear" onclick="clearAll()">クリア</button>
    </div>

    <div id="error-area" class="hidden">
      <hr class="divider">
      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- Results -->
    <div id="results" class="results">
      <hr class="divider">

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>AIが書き換えを生成中です…</p>
      </div>

      <div id="result-content" class="hidden">
        <div class="tab-row">
          <button class="tab active" id="tab-btn-rewrite" onclick="switchTab('rewrite')">C2書き換え</button>
          <button class="tab" id="tab-btn-vocab" onclick="switchTab('vocab')">語彙リスト</button>
          <button class="tab" id="tab-btn-grammar" onclick="switchTab('grammar')">文法チェック</button>
        </div>

        <!-- Rewrite tab -->
        <div id="tab-rewrite">
          <div class="result-card">
            <div class="rewrite-body" id="rewrite-text"></div>
          </div>
        </div>

        <!-- Vocab tab -->
        <div id="tab-vocab" class="hidden">
          <div class="results-header">
            <span class="field-label" style="margin-bottom:0;">語彙・フレーズ一覧</span>
            <button class="download-btn" onclick="downloadCSV()">📥 CSVダウンロード</button>
          </div>
          <div class="result-card" style="overflow: hidden; padding: 0;">
            <table class="vocab-table">
              <thead>
                <tr>
                  <th>表現</th>
                  <th>意味</th>
                  <th>使い方のポイント</th>
                </tr>
              </thead>
              <tbody id="vocab-tbody"></tbody>
            </table>
          </div>
        </div>
        <!-- Grammar tab -->
        <div id="tab-grammar" class="hidden">
          <div class="results-header">
            <span class="field-label" style="margin-bottom:0;">文法エラーの指摘</span>
          </div>
          <div id="grammar-content"></div>
        </div>
      </div>

  </div>

  <script>
    let vocabData = [];
    let grammarData = [];

    // Init
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

    const savedKey = localStorage.getItem('anthropic_api_key');
    if (savedKey) {
      document.getElementById('api-key-input').value = savedKey;
    } else {
      document.getElementById('api-details').open = true;
    }

    function saveKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (key) {
        localStorage.setItem('anthropic_api_key', key);
        document.getElementById('api-details').open = false;
      }
    }

    function getApiKey() {
      return document.getElementById('api-key-input').value.trim() || localStorage.getItem('anthropic_api_key') || '';
    }

    function switchTab(tab) {
      ['rewrite', 'vocab', 'grammar'].forEach(t => {
        document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab);
        document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab);
      });
    }

    function clearAll() {
      document.getElementById('diary-input').value = '';
      document.getElementById('results').classList.remove('visible');
      document.getElementById('error-area').classList.add('hidden');
      document.getElementById('rewrite-text').textContent = '';
      document.getElementById('vocab-tbody').innerHTML = '';
      document.getElementById('grammar-content').innerHTML = '';
      vocabData = [];
      grammarData = [];
    }

    function showError(msg) {
      document.getElementById('error-area').classList.remove('hidden');
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('results').classList.remove('visible');
    }

    function renderGrammar(items) {
      const container = document.getElementById('grammar-content');
      if (!items || items.length === 0) {
        container.innerHTML = '<div class="grammar-none">文法エラーは見つかりませんでした 🎉</div>';
        return;
      }
      const ul = document.createElement('ul');
      ul.className = 'grammar-list';
      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'grammar-item';
        li.innerHTML = `
          <div class="grammar-badge">${item.type}</div>
          <div class="grammar-original">✕ ${item.original}</div>
          <div class="grammar-arrow">↓ 修正</div>
          <div class="grammar-corrected">✓ ${item.corrected}</div>
          <div class="grammar-explanation">${item.explanation}</div>
        `;
        ul.appendChild(li);
      });
      container.innerHTML = '';
      container.appendChild(ul);
    }

    async function runCoach() {
      const diary = document.getElementById('diary-input').value.trim();
      if (!diary) { showError('日記を入力してください。'); return; }

      const apiKey = getApiKey();
      if (!apiKey) {
        showError('APIキーを設定してください。上の「APIキーの設定」を開いて入力してください。');
        document.getElementById('api-details').open = true;
        return;
      }

      document.getElementById('error-area').classList.add('hidden');
      document.getElementById('results').classList.add('visible');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('result-content').classList.add('hidden');
      document.getElementById('run-btn').disabled = true;

      const prompt = `You are a supportive English language coach helping an intermediate learner improve naturally. The user has written a diary entry. Your task is to:

1. Rewrite the diary entry using the following approach:
   - Keep approximately 70% of the original words, sentence structures, and personal voice intact.
   - Fix all grammar errors and unnatural phrasing.
   - Upgrade only about 30% of the expressions: replace a few plain or repetitive words/phrases with more precise or natural alternatives that feel like a small, achievable step up — not a dramatic leap.
   - The result should feel like "the same person writing slightly better", not like a different writer entirely.
   - Preserve the original structure (Happy moments / Reflections / Gratitude) if present.

2. Extract 6-10 upgraded phrases/expressions from your rewrite (focus on the words you actually changed or improved). For each, explain in Japanese: what it means, why it is better than the original, and how to use it.

3. Identify all grammar errors in the ORIGINAL text. For each error, provide: the original incorrect phrase, the corrected version, the error type in Japanese (e.g. 時制の誤り, 冠詞の欠落, 助動詞の誤用, 前置詞の誤り, 動詞の活用, 語法の誤り), and a clear explanation in Japanese of why it is wrong and how to fix it.

Return ONLY a JSON object with this exact structure, no markdown, no preamble:
{
  "rewrite": "The improved diary entry here",
  "vocab": [
    {"phrase": "expression", "meaning": "Japanese meaning", "tip": "Usage tip in Japanese — explain why this is better than what the user originally wrote"}
  ],
  "grammar": [
    {"original": "incorrect phrase from original", "corrected": "corrected version", "type": "エラーの種類", "explanation": "日本語での説明"}
  ]
}

If there are no grammar errors, return an empty array for grammar: [].

Diary entry:
${diary}`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 2500,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err?.error?.message || `APIエラー (${response.status})`);
        }

        const data = await response.json();
        const raw = data.content.map(i => i.text || '').join('').trim().replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(raw);

        document.getElementById('rewrite-text').textContent = parsed.rewrite;
        vocabData = parsed.vocab;
        grammarData = parsed.grammar || [];

        const tbody = document.getElementById('vocab-tbody');
        tbody.innerHTML = '';
        parsed.vocab.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="phrase-col">${item.phrase}</td>
            <td class="meaning-col">${item.meaning}</td>
            <td class="tip-col">${item.tip}</td>
          `;
          tbody.appendChild(tr);
        });

        renderGrammar(grammarData);

        switchTab('rewrite');
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('result-content').classList.remove('hidden');

      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('results').classList.remove('visible');
        showError('エラーが発生しました: ' + err.message);
      } finally {
        document.getElementById('run-btn').disabled = false;
      }
    }

    function downloadCSV() {
      if (!vocabData.length) return;
      const rows = [
        ['表現', '意味', '使い方のポイント'],
        ...vocabData.map(v => [v.phrase, v.meaning, v.tip])
      ];
      const csv = rows.map(r => r.map(c => `"${(c || '').replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `diary_vocab_${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Enter key shortcut (Ctrl/Cmd + Enter)
    document.getElementById('diary-input').addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runCoach();
    });
  </script>
</body>
</html>
